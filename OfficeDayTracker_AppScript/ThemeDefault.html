  <style id="theme">
    :root {
      --bg:          #f5f3ff;
      --card:        #ffffff;
      --office-bg:   #bbf7d0; --office-text:   #166534;
      --home-bg:     #bfdbfe; --home-text:     #1e40af;
      --vacation-bg: #fed7aa; --vacation-text: #7c2d12;
      --holiday-bg:  #e9d5ff; --holiday-text:  #6b21a8;
      --oncall-bg:   #fde68a; --oncall-text:   #92400e;
      --weekend-bg:  #fef3c7; --weekend-text:  #92400e;
      --warn-bg:     #fff7ed; --warn-text:     #c2410c;
      --muted:       #9ca3af;
      --separator:   #f3f4f6;
      --text:        #111827;
      --accent:      #7c3aed;
      --shadow:      0 2px 16px rgba(0,0,0,0.07);
      --ring1: #a78bfa; --ring1-bg: rgba(167,139,250,0.15);
      --ring2: #60a5fa; --ring2-bg: rgba(96,165,250,0.15);
      --ring3: #34d399; --ring3-bg: rgba(52,211,153,0.15);
      --ring4: #fb923c; --ring4-bg: rgba(251,146,60,0.15);
      /* Chart palette — opacity variants of ring colors */
      --chart-bar-fill:    rgba(167,139,250,0.25);
      --chart-bar-stroke:  rgba(167,139,250,0.65);
      --chart-dim-fill:    rgba(150,150,150,0.15);
      --chart-dim-stroke:  rgba(150,150,150,0.40);
      --chart-dim-point:   rgba(150,150,150,0.50);
      --chart-ring1-dim:   rgba(167,139,250,0.40);
      --chart-ring2-dim:   rgba(96,165,250,0.40);
      --chart-ring3-dim:   rgba(52,211,153,0.40);
      --chart-line-fill-1: rgba(167,139,250,0.10);
      --chart-line-fill-2: rgba(96,165,250,0.10);
      --chart-line-fill-3: rgba(52,211,153,0.10);
      /* YTD donut chart colors — light and dark both in :root so cv() can read at init */
      --ytd-office:   rgba(187,247,208,0.9);
      --ytd-home:     rgba(191,219,254,0.9);
      --ytd-vacation: rgba(254,215,170,0.9);
      --ytd-holiday:  rgba(233,213,255,0.9);
      --ytd-oncall:   rgba(253,230,138,0.9);
      --ytd-dark-office:      #224a2a;
      --ytd-dark-home:        #1e3252;
      --ytd-dark-vacation-1:  #3a2010; --ytd-dark-vacation-2: #5a3418;
      --ytd-dark-holiday-1:   #28204a; --ytd-dark-holiday-2:  #3a3068;
      --ytd-dark-oncall-1:    #3a2810; --ytd-dark-oncall-2:   #5a4020;
    }
    body.dark {
      --bg:          #0f0f1a;
      --card:        #1c1c2e;
      --office-bg:   #224a2a; --office-text:   #86efac;
      --home-bg:     #1e3252; --home-text:     #93c5fd;
      --vacation-bg: #3a2010; --vacation-text: #fed7aa;
      --holiday-bg:  #28204a; --holiday-text:  #d8b4fe;
      --oncall-bg:   #3a2810; --oncall-text:   #fde68a;
      --weekend-bg:  #1a3a10; --weekend-text:  #c0e888;
      --warn-bg:     #2e1a10; --warn-text:     #fb923c;
      --muted:       #6b7280;
      --separator:   #2d2d40;
      --text:        #f0f0ff;
      --accent:      #a78bfa;
      --shadow:      0 2px 16px rgba(0,0,0,0.4);
      --ring3: #52c4a8;
    }
    body.dark .cal-day.vacation {
      background: repeating-linear-gradient(45deg, #3a2010 0px, #3a2010 4px, #5a3418 4px, #5a3418 8px);
      color: #fed7aa;
    }
    body.dark .cal-day.holiday {
      background: repeating-linear-gradient(45deg, #28204a 0px, #28204a 4px, #3a3068 4px, #3a3068 8px);
      color: #d8b4fe;
    }
    body.dark .cal-day.oncalloff {
      background: repeating-linear-gradient(45deg, #3a2810 0px, #3a2810 4px, #5a4020 4px, #5a4020 8px);
      color: #fde68a;
    }
    body.dark .legend-dot.d-vacation { background: repeating-linear-gradient(45deg, #3a2010 0px, #3a2010 4px, #5a3418 4px, #5a3418 8px) !important; }
    body.dark .legend-dot.d-holiday  { background: repeating-linear-gradient(45deg, #28204a 0px, #28204a 4px, #3a3068 4px, #3a3068 8px) !important; }
    body.dark .legend-dot.d-oncall   { background: repeating-linear-gradient(45deg, #3a2810 0px, #3a2810 4px, #5a4020 4px, #5a4020 8px) !important; }
    body.dark .ytd-item.vacation-ytd { background: repeating-linear-gradient(45deg, #3a2010 0px, #3a2010 4px, #5a3418 4px, #5a3418 8px) !important; }
    body.dark .ytd-item.holiday-ytd  { background: repeating-linear-gradient(45deg, #28204a 0px, #28204a 4px, #3a3068 4px, #3a3068 8px) !important; }
    body.dark .ytd-item.oncall-ytd   { background: repeating-linear-gradient(45deg, #3a2810 0px, #3a2810 4px, #5a4020 4px, #5a4020 8px) !important; }
    body.dark .hm-cell.vacation  { background: repeating-linear-gradient(45deg, #3a2010 0px, #3a2010 4px, #5a3418 4px, #5a3418 8px); }
    body.dark .hm-cell.holiday   { background: repeating-linear-gradient(45deg, #28204a 0px, #28204a 4px, #3a3068 4px, #3a3068 8px); }
    body.dark .hm-cell.oncalloff { background: repeating-linear-gradient(45deg, #3a2810 0px, #3a2810 4px, #5a4020 4px, #5a4020 8px); }
    body.dark .card { border: 1px solid #2d2d40; }
    body.dark .error-card .error-msg { color: #6b7280; }
    .recommendation           { background: #fee2e2; color: #dc2626; }
    .recommendation.info      { background: #d1fae5; color: #065f46; }
    body.dark .recommendation      { background: #3a1a1a; color: #f87171; }
    body.dark .recommendation.info { background: #0a2e1a; color: #6ee7b7; }
    .error-title.danger  { color: #dc2626; }
    .error-title.neutral { color: var(--muted); }
    body.dark .error-title.danger { color: #f87171; }
    .cal-day.today                { outline: 2px solid #6b7280;  outline-offset: 1px; }
    .cal-day.today.office         { outline: 2px solid #16a34a;  outline-offset: 1px; }
    .cal-day.today.home           { outline: 2px solid #2563eb;  outline-offset: 1px; }
    .cal-day.today.vacation       { outline: 2px solid #ea580c;  outline-offset: 1px; }
    .cal-day.today.holiday        { outline: 2px solid #7c3aed;  outline-offset: 1px; }
    .cal-day.today.oncalloff      { outline: 2px solid #d97706;  outline-offset: 1px; }
    .cal-day.today.future         { outline: 2px solid #9ca3af;  outline-offset: 1px; }
  </style>
