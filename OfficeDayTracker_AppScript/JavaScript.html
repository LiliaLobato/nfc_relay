<script>
  const DATA = <?!= JSON.stringify(data) ?>;

  // ---- Dark mode toggle ----
  function toggleDark(btn) {
    document.body.classList.toggle('dark');
    const isDark = document.body.classList.contains('dark');
    btn.textContent = isDark ? '☀️' : '🌙';
    const newColors = isDark ? ytdColorsDark : ytdColorsLight;
    const c = charts['ytd-o'];
    if (c) { c.data.datasets[0].backgroundColor = newColors; c.update(); }
  }

  // ---- Calendar ----
  function buildCalendar(id) {
    const el = document.getElementById(id);
    if (!el) return;
    const types       = DATA.calendar.types;
    const calPrevDays = DATA.calendar.prevDays;
    const calNextDays = DATA.calendar.nextDays;
    const todayNum    = DATA.calendar.today;
    const daysInMonth = DATA.calendar.daysInMonth;

    ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].forEach(d => {
      const h = document.createElement('div');
      h.className = 'cal-day-name'; h.textContent = d; el.appendChild(h);
    });
    calPrevDays.forEach(({ day, type }) => {
      const cell = document.createElement('div');
      cell.className = `cal-day ${type} other-month`;
      cell.textContent = day;
      el.appendChild(cell);
    });
    for (let d = 1; d <= daysInMonth; d++) {
      const cell = document.createElement('div');
      const type = types[d] || 'future';
      cell.className = 'cal-day ' + type + (d === todayNum ? ' today' : '');
      cell.textContent = d;
      el.appendChild(cell);
    }
    calNextDays.forEach(({ day, type }) => {
      const cell = document.createElement('div');
      cell.className = `cal-day ${type} other-month`;
      cell.textContent = day;
      el.appendChild(cell);
    });
  }

  buildCalendar('cal-o');

  // ---- CSS variable reader ----
  const cv = s => getComputedStyle(document.documentElement).getPropertyValue(s).trim();

  // ---- Rings ----
  const GOAL = DATA.charts.goal;
  const ringFill = [cv('--ring1'), cv('--ring2'), cv('--ring3'), cv('--ring4')];
  const ringBg   = [cv('--ring1-bg'), cv('--ring2-bg'), cv('--ring3-bg'), cv('--ring4-bg')];
  const chartBarFill    = cv('--chart-bar-fill');
  const chartBarStroke  = cv('--chart-bar-stroke');
  const chartDimFill    = cv('--chart-dim-fill');
  const chartDimStroke  = cv('--chart-dim-stroke');
  const chartDimPoint   = cv('--chart-dim-point');
  const chartRing1Dim   = cv('--chart-ring1-dim');
  const chartRing2Dim   = cv('--chart-ring2-dim');
  const chartRing3Dim   = cv('--chart-ring3-dim');
  const lineFillColors  = [cv('--chart-line-fill-1'), cv('--chart-line-fill-2'), cv('--chart-line-fill-3')];

  function makeRing(id, val, i) {
    const pct = Math.min(val / GOAL, 1);
    new Chart(document.getElementById(id), {
      type: 'doughnut',
      data: { datasets: [{ data:[pct, 1-pct], backgroundColor:[ringFill[i],ringBg[i]], borderWidth:0, borderRadius:5 }] },
      options: {
        cutout:'72%', responsive:false,
        plugins:{ legend:{display:false}, tooltip:{enabled:false} },
        animation:{ duration:2000, easing:'easeOutQuart' }
      }
    });
  }
  function makeRingPct(id, pct, i) {
    pct = Math.min(pct, 1);
    new Chart(document.getElementById(id), {
      type: 'doughnut',
      data: { datasets: [{ data:[pct, 1-pct], backgroundColor:[ringFill[i],ringBg[i]], borderWidth:0, borderRadius:5 }] },
      options: {
        cutout:'72%', responsive:false,
        plugins:{ legend:{display:false}, tooltip:{enabled:false} },
        animation:{ duration:2000, easing:'easeOutQuart' }
      }
    });
  }

  const goalPct   = DATA.rings.goalActual / DATA.rings.goalTarget;
  const goalLabel = Math.round(goalPct * 100) + '%';

  makeRing('r-o-1', DATA.rings.weekAvg,  0);
  makeRing('r-o-2', DATA.rings.monthAvg, 1);
  makeRing('r-o-3', DATA.rings.yearAvg,  2);
  makeRingPct('r-o-4', goalPct, 3);
  document.querySelector('#r-o-4').closest('.ring-wrap').querySelector('.ring-center').textContent = goalLabel;

  // ---- Chart period data ----
  const periodData = {
    week:  { barLabels: DATA.charts.week.barLabels,  barData: DATA.charts.week.barData,  lineLabels: DATA.charts.week.labels,  line1: DATA.charts.week.line1,  line2: DATA.charts.week.line2,  line3: DATA.charts.week.line3  },
    month: { barLabels: DATA.charts.month.barLabels, barData: DATA.charts.month.barData, lineLabels: DATA.charts.month.labels, line1: DATA.charts.month.line1, line2: DATA.charts.month.line2, line3: DATA.charts.month.line3 },
    year:  { barLabels: DATA.charts.year.barLabels,  barData: DATA.charts.year.barData,  lineLabels: DATA.charts.year.labels,  line1: DATA.charts.year.line1,  line2: DATA.charts.year.line2,  line3: DATA.charts.year.line3  }
  };

  // Store chart instances
  const charts = {};

  // ---- Current date references ----
  const _today = new Date();
  const _todayDow = _today.getDay();
  const TODAY_DOW_IDX = _todayDow === 0 ? -1 : _todayDow - 1;
  const DOW_LABELS = ['Mon','Tue','Wed','Thu','Fri'];

  function paceHighlightArrays(n, labels) {
    const hi = n - 1;
    const prev = labels ? labels.map(l => l.endsWith('/25')) : Array(n).fill(false);
    const colors = Array.from({length:n}, (_,i) => prev[i] ? chartDimPoint : (i%3===2 ? chartRing1Dim : ringFill[0]));
    colors[hi] = prev[hi] ? chartDimPoint : ringFill[0];
    const sizes  = Array.from({length:n}, (_,i) => i%3===2 ? 5 : 3);
    sizes[hi] = 6;
    return { colors, sizes };
  }

  const xHiLabel = {};
  const xTickColor = ctx => {
    const target = xHiLabel[ctx.chart.canvas.id];
    const label = ctx.label ?? ctx.chart.data.labels?.[ctx.index];
    if (target && label === target) return ringFill[0];
    if (label && label.endsWith('/25')) return chartDimPoint;
    return 'rgba(102,102,102,1)';
  };

  function barColorArrays(labels) {
    const bg     = labels.map(l => l.endsWith('/25') ? chartDimFill   : chartBarFill);
    const border = labels.map(l => l.endsWith('/25') ? chartDimStroke : chartBarStroke);
    return { bg, border };
  }

  function makeBarChart(id, period) {
    const d = periodData[period];
    xHiLabel[id] = period === 'week'
      ? (TODAY_DOW_IDX >= 0 ? DOW_LABELS[TODAY_DOW_IDX] : null)
      : d.barLabels[d.barLabels.length - 1];
    const bc = barColorArrays(d.barLabels);
    const chart = new Chart(document.getElementById(id), {
      type: 'bar',
      data: {
        labels: d.barLabels,
        datasets: [{ label:'Office days', data: d.barData,
          backgroundColor: bc.bg, borderColor: bc.border, borderWidth:1.5, borderRadius:6 }]
      },
      options: {
        responsive:true,
        plugins:{ legend:{display:false} },
        scales:{
          y:{ beginAtZero:true, title:{ display: true, text:'Office days', font:{size:10}, color:'rgba(102,102,102,0.8)' }, ticks:{display: true, stepSize:1, font:{size:11}}, grid:{color:'rgba(128,128,128,0.15)'} },
          x:{ ticks:{font:{size:10}, maxRotation:45, autoSkip:false, color:xTickColor}, grid:{display:false} }
        }
      }
    });
    if (period === 'week') {
      chart.options.scales.y.ticks.display = false;
    }
    return chart;
  }

  function linePointRadii(n, labels) {
    const big = 5, small = 2;
    const prev = labels ? labels.map(l => l.endsWith('/25')) : Array(n).fill(false);
    const s0 = Array.from({length:n}, (_,i) => prev[i] ? small : (i%3===0 ? big : small));
    const s1 = Array.from({length:n}, (_,i) => prev[i] ? small : (i%3===2 ? big : small));
    const s2 = Array.from({length:n}, (_,i) => prev[i] ? small : (i%3===1 ? big : small));
    const c0 = Array.from({length:n}, (_,i) => prev[i] ? chartDimPoint : (i%3===0 ? chartRing1Dim : ringFill[0]));
    const c1 = Array.from({length:n}, (_,i) => prev[i] ? chartDimPoint : (i%3===2 ? chartRing2Dim : ringFill[1]));
    const c2 = Array.from({length:n}, (_,i) => prev[i] ? chartDimPoint : (i%3===1 ? chartRing3Dim : ringFill[2]));
    return { s0, s1, s2, c0, c1, c2 };
  }

  function updateLineFill(chart) {
    const fillIdx = [0, 1, 2].find(i => !chart.getDatasetMeta(i).hidden);
    chart.data.datasets.forEach((ds, i) => {
      ds.fill = i === fillIdx;
      ds.backgroundColor = i === fillIdx ? lineFillColors[i] : 'transparent';
    });
    chart.update('none');
  }

  function makeLineChart(id, period) {
    const d = periodData[period];
    const radii = linePointRadii(d.lineLabels.length, d.lineLabels);
    const datasets = [
      { label:'Best 10/12', data:d.line1, borderColor:ringFill[0], backgroundColor:lineFillColors[0], borderWidth:2, pointRadius:radii.s0, pointBackgroundColor:radii.c0, tension:0.4, fill:true },
      { label:'Best 8/12',  data:d.line2, borderColor:ringFill[1], backgroundColor:'transparent', borderWidth:2, pointRadius:radii.s1, pointBackgroundColor:radii.c1, tension:0.4 },
      { label:'Best 8/10',  data:d.line3, borderColor:ringFill[2], backgroundColor:'transparent', borderWidth:2, pointRadius:radii.s2, pointBackgroundColor:radii.c2, tension:0.4 }
    ];
    xHiLabel[id] = d.lineLabels[d.lineLabels.length - 1];
    const lineChart = new Chart(document.getElementById(id), {
      type: 'line',
      data: { labels: d.lineLabels, datasets },
      options: {
        responsive:true,
        plugins:{
          legend:{
            labels:{ font:{size:11}, boxWidth:12 },
            onClick(e, legendItem, legend) {
              const chart = legend.chart;
              const meta = chart.getDatasetMeta(legendItem.datasetIndex);
              meta.hidden = !meta.hidden;
              updateLineFill(chart);
            }
          }
        },
        scales:{
          y:{ min:1, max:3.5, title:{ display:true, text:'Average', font:{size:10}, color:'rgba(102,102,102,0.8)' }, ticks:{font:{size:11}}, grid:{color:'rgba(128,128,128,0.15)'} },
          x:{ ticks:{font:{size:10}, maxRotation:45, color:xTickColor}, grid:{display:false} }
        }
      }
    });
    return lineChart;
  }

  charts['bar-o']  = makeBarChart('bar-o',  'week');
  charts['line-o'] = makeLineChart('line-o', 'week');

  // ---- Period switcher ----
  const barTitles  = { week:'Office days by weekday', month:'Office days by week', year:'Office days by month' };
  const lineTitles = { week:'Last 4 weeks', month:'Last 6 months', year:'Last 12 months' };

  function setPeriod(view, period, btn) {
    btn.closest('.period-tabs').querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    const d = periodData[period];

    const bar = charts[`bar-${view}`];
    const bc = barColorArrays(d.barLabels);
    bar.data.labels = d.barLabels;
    bar.data.datasets[0].data = d.barData;
    bar.data.datasets[0].backgroundColor = bc.bg;
    bar.data.datasets[0].borderColor = bc.border;
    xHiLabel[`bar-${view}`] = period === 'week'
      ? (TODAY_DOW_IDX >= 0 ? DOW_LABELS[TODAY_DOW_IDX] : null)
      : d.barLabels[d.barLabels.length - 1];
    bar.options.scales.y.ticks.display = period !== 'week';
    bar.update();
    document.getElementById(`bar-title-${view}`).textContent = barTitles[period];

    const line = charts[`line-${view}`];
    const radii = linePointRadii(d.lineLabels.length, d.lineLabels);
    line.data.labels = d.lineLabels;
    line.data.datasets[0].data = d.line1; line.data.datasets[0].pointRadius = radii.s0; line.data.datasets[0].pointBackgroundColor = radii.c0;
    line.data.datasets[1].data = d.line2; line.data.datasets[1].pointRadius = radii.s1; line.data.datasets[1].pointBackgroundColor = radii.c1;
    line.data.datasets[2].data = d.line3; line.data.datasets[2].pointRadius = radii.s2; line.data.datasets[2].pointBackgroundColor = radii.c2;
    xHiLabel[`line-${view}`] = d.lineLabels[d.lineLabels.length - 1];
    line.update();
    document.getElementById(`line-title-${view}`).textContent = lineTitles[period];

    const pd = paceByPeriod[period];
    const pace = charts[`pace-${view}`];
    const ph = paceHighlightArrays(pd.labels.length, pd.labels);
    pace.data.labels = pd.labels;
    pace.data.datasets[0].data = pd.actual;
    pace.data.datasets[0].pointRadius = ph.sizes;
    pace.data.datasets[0].pointBackgroundColor = ph.colors;
    pace.data.datasets[1].data = pd.goal;
    xHiLabel[`pace-${view}`] = pd.labels[pd.labels.length - 1];
    pace.update();

    const ytdData = ytdByPeriod[period];
    const ytdChart = charts[`ytd-${view}`];
    ytdChart.data.datasets[0].data = ytdData;
    ytdChart.update();
    const ytdTitleEl = document.querySelector(`#cy-${view}`).closest('.chart-item').querySelector('.chart-item-title');
    ytdTitleEl.textContent = ytdTitles[period];
    const ytdRow = document.querySelector(`#cy-${view} .ytd-row`);
    const [off, hm, vac, hol, oc] = ytdData;
    ytdRow.innerHTML = `<span class="ytd-item office-ytd">Office <strong>${off}</strong></span><span class="ytd-item home-ytd">Home <strong>${hm}</strong></span><span class="ytd-item vacation-ytd">Vacation <strong>${vac}</strong></span><span class="ytd-item holiday-ytd">Holiday <strong>${hol}</strong></span><span class="ytd-item oncall-ytd">OnCall day off <strong>${oc}</strong></span>`;

    const chartsCard = btn.closest('.charts-card');
    chartsCard.querySelectorAll('.bw-weekday').forEach(el => el.style.display = period === 'week'  ? 'flex' : 'none');
    chartsCard.querySelectorAll('.bw-weekly') .forEach(el => el.style.display = period === 'month' ? 'flex' : 'none');
    chartsCard.querySelectorAll('.bw-monthly').forEach(el => el.style.display = period === 'year'  ? 'flex' : 'none');

    buildHeatmap(`heatmap-${view}`, hmDataByPeriod[period]);
    const hmTitleEl = document.querySelector(`#heatmap-${view}`).closest('.chart-item').querySelector('.chart-item-title');
    hmTitleEl.textContent = hmTitles[period];
  }

  // ---- Pace Tracker ----
  const paceByPeriod = {
    week:  { labels: DATA.charts.week.labels,  actual: DATA.charts.week.paceActual,  goal: DATA.charts.week.paceGoal  },
    month: { labels: DATA.charts.month.labels, actual: DATA.charts.month.paceActual, goal: DATA.charts.month.paceGoal },
    year:  { labels: DATA.charts.year.labels,  actual: DATA.charts.year.paceActual,  goal: DATA.charts.year.paceGoal  }
  };

  function makePaceChart(id, period = 'week') {
    const pd = paceByPeriod[period];
    const ph = paceHighlightArrays(pd.labels.length, pd.labels);
    xHiLabel[id] = pd.labels[pd.labels.length - 1];
    const paceChart = new Chart(document.getElementById(id), {
      type: 'line',
      data: {
        labels: pd.labels,
        datasets: [
          {
            label: 'Actual',
            data: pd.actual,
            borderColor: ringFill[0],
            backgroundColor: lineFillColors[0],
            borderWidth: 2,
            pointRadius: ph.sizes,
            pointBackgroundColor: ph.colors,
            tension: 0.3,
            fill: true
          },
          {
            label: 'Goal pace',
            data: pd.goal,
            borderColor: 'rgba(156,163,175,0.5)',
            backgroundColor: 'transparent',
            borderWidth: 1.5,
            borderDash: [4, 4],
            pointRadius: 0,
            tension: 0
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { position: 'bottom', labels: { font:{size:11}, boxWidth:12 }, onClick: () => {} } },
        scales: {
          y: { beginAtZero: true, title:{ display:true, text:'Office days', font:{size:10}, color:'rgba(102,102,102,0.8)' }, ticks:{font:{size:11}}, grid:{color:'rgba(128,128,128,0.15)'} },
          x: { ticks:{font:{size:9}, maxRotation:45, color:xTickColor}, grid:{display:false} }
        }
      }
    });
    return paceChart;
  }
  charts['pace-o'] = makePaceChart('pace-o', 'week');

  setTimeout(() => {
    ['bar-o', 'line-o', 'pace-o'].forEach(id => {
      if (charts[id]) { charts[id].reset(); charts[id].update(); }
    });
  }, 150);

  // ---- YTD Split donut ----
  const ytdByPeriod = {
    week:  DATA.charts.week.ytd,
    month: DATA.charts.month.ytd,
    year:  DATA.charts.year.ytd
  };
  const ytdTitles = { week:'Last 4 weeks split', month:'Last 6 months split', year:'Last 12 months split' };
  const ytdLabels = ['Office','Home','Vacation','Holiday','OnCall day off'];

  function makeStripePattern(c1, c2) {
    const sz = 8;
    const patCanvas = document.createElement('canvas');
    patCanvas.width = sz; patCanvas.height = sz;
    const ctx = patCanvas.getContext('2d');
    ctx.fillStyle = c1;
    ctx.fillRect(0, 0, sz, sz);
    ctx.fillStyle = c2;
    for (let y = 0; y < sz; y++)
      for (let x = 0; x < sz; x++)
        if (((x + y) % sz) < sz / 2) ctx.fillRect(x, y, 1, 1);
    const tmp = document.createElement('canvas');
    tmp.width = 1; tmp.height = 1;
    return tmp.getContext('2d').createPattern(patCanvas, 'repeat');
  }

  const ytdColorsLight = [
    cv('--ytd-office'), cv('--ytd-home'), cv('--ytd-vacation'), cv('--ytd-holiday'), cv('--ytd-oncall')
  ];
  const ytdColorsDark  = [
    cv('--ytd-dark-office'),
    cv('--ytd-dark-home'),
    makeStripePattern(cv('--ytd-dark-vacation-1'), cv('--ytd-dark-vacation-2')),
    makeStripePattern(cv('--ytd-dark-holiday-1'),  cv('--ytd-dark-holiday-2')),
    makeStripePattern(cv('--ytd-dark-oncall-1'),   cv('--ytd-dark-oncall-2'))
  ];

  function makeYtdChart(id) {
    return new Chart(document.getElementById(id), {
      type: 'doughnut',
      data: {
        labels: ytdLabels,
        datasets: [{ data: ytdByPeriod.week, backgroundColor: ytdColorsLight, borderWidth: 0 }]
      },
      options: {
        cutout: '50%',
        responsive: true,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: function(ctx) {
                const total = ctx.dataset.data.reduce((a,b) => a+b, 0);
                const pct = Math.round(ctx.parsed / total * 100);
                return ` ${ctx.label}: ${pct}%`;
              }
            }
          }
        }
      }
    });
  }
  charts['ytd-o'] = makeYtdChart('ytd-o');

  // Initialize YTD row from DATA
  const _ytdRow = document.querySelector('#cy-o .ytd-row');
  if (_ytdRow) {
    const [_off, _hm, _vac, _hol, _oc] = ytdByPeriod.week;
    _ytdRow.innerHTML = `<span class="ytd-item office-ytd">Office <strong>${_off}</strong></span><span class="ytd-item home-ytd">Home <strong>${_hm}</strong></span><span class="ytd-item vacation-ytd">Vacation <strong>${_vac}</strong></span><span class="ytd-item holiday-ytd">Holiday <strong>${_hol}</strong></span><span class="ytd-item oncall-ytd">OnCall day off <strong>${_oc}</strong></span>`;
  }

  // ---- Weekday Heatmap ----
  const hmDataYear     = DATA.charts.heatmap;
  const hmEntries      = Object.entries(hmDataYear);
  const hmDataMonth    = Object.fromEntries(hmEntries.slice(-26));
  const hmDataWeek     = Object.fromEntries(hmEntries.slice(-4));
  const hmDataByPeriod = { week: hmDataWeek, month: hmDataMonth, year: hmDataYear };
  const hmTitles       = { week:'4 weeks heatmap', month:'6 months heatmap', year:'12 months heatmap' };

  const dayNames = ['Mon','Tue','Wed','Thu','Fri'];

  function buildHeatmap(id, data) {
    const el = document.getElementById(id);
    if (!el) return;
    el.innerHTML = '';
    const corner = document.createElement('div'); corner.className = 'hm-head'; el.appendChild(corner);
    dayNames.forEach(d => {
      const h = document.createElement('div'); h.className = 'hm-head'; h.textContent = d; el.appendChild(h);
    });
    Object.entries(data).forEach(([ww, types]) => {
      const wwEl = document.createElement('div'); wwEl.className = 'hm-ww'; wwEl.textContent = ww; el.appendChild(wwEl);
      types.forEach((type, i) => {
        const cell = document.createElement('div');
        cell.className = 'hm-cell' + (type ? ' ' + type : '');
        if (type) cell.title = `${ww} ${dayNames[i]}: ${type.charAt(0).toUpperCase() + type.slice(1)}`;
        el.appendChild(cell);
      });
    });
    const chartBody = el.parentElement.parentElement;
    if (!chartBody.querySelector('.hm-legend')) {
      const legend = document.createElement('div');
      legend.className = 'hm-legend';
      legend.style.cssText = 'display:flex;flex-wrap:wrap;gap:10px;margin-top:14px;justify-content:center;';
      [['d-office','Office'],['d-home','Home'],['d-vacation','Vacation'],['d-holiday','Holiday'],['d-oncall','OnCall day off']].forEach(([cls,label]) => {
        const item = document.createElement('div'); item.className = 'legend-item';
        const dot = document.createElement('div'); dot.className = 'legend-dot ' + cls;
        item.appendChild(dot); item.appendChild(document.createTextNode(label));
        legend.appendChild(item);
      });
      chartBody.appendChild(legend);
    }
  }
  buildHeatmap('heatmap-o', hmDataByPeriod.week);
</script>
