<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NFC Relay</title>
  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxfLc4F8IijAp4wWoEY7nEbsjyCElpAxXmX5gS66a8VT9xbiI-evVBXRIm6O0RBA1z7Iw/exec";

    window.onload = () => {
      const params = new URLSearchParams(window.location.search);
      const queryString = params.toString();
      window.location.href = `${SCRIPT_URL}?${queryString}`;
    };
  </script>
</head>
<body>
  <p>Redirecting…</p>
</body>
</html>
